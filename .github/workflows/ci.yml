name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Lint and test (Windows)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (pinned)
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install cargo-about
        uses: taiki-e/install-action@e1c4cd42111751368541a7cb5db3522bd1f846a4 # v2.78.0
        with:
          tool: cargo-about

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-features -- -D warnings

      - name: cargo test
        run: cargo test --workspace --features biscotti/gui

      - name: Verify THIRD-PARTY-LICENSES is current
        shell: pwsh
        run: |
          cargo about generate --all-features about.hbs -o THIRD-PARTY-LICENSES
          git diff --exit-code -- THIRD-PARTY-LICENSES
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::THIRD-PARTY-LICENSES is out of date. Run 'cargo about generate --all-features about.hbs -o THIRD-PARTY-LICENSES' locally and commit the result."
            exit 1
          }
