name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Lint and test (Windows)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (pinned)
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install cargo-about
        uses: taiki-e/install-action@7572810d7dd469b651bb7793945692cf78da5dd7 # v2.85.0
        with:
          tool: cargo-about

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-features -- -D warnings

      - name: cargo test
        run: cargo test --workspace --features biscotti/gui

      - name: Verify license inventory builds (catches unaccepted licenses)
        shell: pwsh
        run: |
          $output = Join-Path $env:RUNNER_TEMP 'THIRD-PARTY-LICENSES.check'
          cargo about generate --all-features about.hbs -o $output
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::cargo about failed to generate the license inventory. A dependency may have an unaccepted license; update about.toml's 'accepted' list if appropriate."
            exit 1
          }
