accepted = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "CC0-1.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OpenSSL",
    "BSL-1.0",
    "0BSD",
    "WTFPL",
    "NCSA",
]

ignore-build-dependencies = true
ignore-dev-dependencies = true
ignore-transitive-dependencies = false

# Per-crate clarifications when SPDX expression cannot be inferred automatically.
[ring]
accepted = ["MIT", "ISC", "OpenSSL"]
